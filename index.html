<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Qwen Chat - AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          <span>Qwen Chat</span>
        </div>
        <button class="icon-btn" id="newChatBtn" title="Chat baru">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div class="chat-list" id="chatList">
        <div class="empty-state">Belum ada riwayat chat</div>
      </div>
      <div class="sidebar-footer">
        <div class="model-selector">
          <label>Model:</label>
          <select id="modelSelect">
            <option value="qwen-vl-max-latest">Qwen VL Max (Vision)</option>
            <option value="qwen-vl-plus-latest">Qwen VL Plus (Vision)</option>
            <option value="qwen-max-latest">Qwen Max (Text)</option>
            <option value="qwen-plus-latest">Qwen Plus (Text)</option>
            <option value="qwen-turbo-latest">Qwen Turbo (Fast)</option>
          </select>
        </div>
      </div>
    </aside>
    
    <main class="main">
      <header class="main-header">
        <button class="icon-btn" id="menuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 id="currentChatTitle">Chat Baru</h1>
      </header>
      
      <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">✨</div>
          <h2>Halo! Saya Qwen</h2>
          <p>Asisten AI yang bisa membantu Anda dengan teks, menganalisis gambar, dan membaca dokumen.</p>
          <div class="suggestion-grid">
            <div class="suggestion-card" data-prompt="Jelaskan konsep quantum computing dengan sederhana">💡 Jelaskan quantum computing</div>
            <div class="suggestion-card" data-prompt="Buatkan kode Python untuk kalkulator sederhana">💻 Kode Python</div>
            <div class="suggestion-card" data-prompt="Upload gambar dan minta saya menganalisisnya">🖼️ Analisis gambar</div>
            <div class="suggestion-card" data-prompt="Buatkan puisi tentang teknologi">✍️ Tulis puisi</div>
          </div>
        </div>
      </div>
      
      <div class="input-area">
        <div class="attachment-preview" id="attachmentPreview"></div>
        <form class="input-form" id="chatForm">
          <button type="button" class="icon-btn attach-btn" id="attachBtn" title="Lampirkan file">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>
          <input type="file" id="fileInput" multiple accept="image/*,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css,.java,.cpp,.c,.php,.rb,.go,.rs,.sql,.log,.xml,.pdf" hidden />
          <textarea id="messageInput" placeholder="Kirim pesan ke Qwen..." rows="1" maxlength="10000"></textarea>
          <button type="submit" class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
        <div class="disclaimer">Qwen bisa membuat kesalahan. Verifikasi informasi penting.</div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
